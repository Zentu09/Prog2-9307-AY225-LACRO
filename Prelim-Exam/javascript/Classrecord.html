<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Records</title>
    <link rel="stylesheet" href="record.css">
</head>
<body>

<div class="container">

    <h1>Grade Records - Art Louie Lacro 22-1190-438</h1>

    <!-- Search -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by ID or Name...">
    </div>

    <!-- Form Card -->
    <div class="form-card">
        <form id="studentForm">

            <!-- Row 1: Names -->
            <div class="form-row">
                <div class="form-group">
                    <label for="studentID">Student ID</label>
                    <input type="text" id="studentID" name="studentID" maxlength="8" required>
                </div>
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" maxlength="15" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" maxlength="15" required>
                </div>
            </div>

            <!-- Row 2: Lab Grades -->
            <div class="form-row">
                <div class="form-group">
                    <label for="lab1">Lab 1</label>
                    <input type="number" id="lab1" name="lab1" min="0" max="100" required>
                </div>
                <div class="form-group">
                    <label for="lab2">Lab 2</label>
                    <input type="number" id="lab2" name="lab2" min="0" max="100" required>
                </div>
                <div class="form-group">
                    <label for="lab3">Lab 3</label>
                    <input type="number" id="lab3" name="lab3" min="0" max="100" required>
                </div>
            </div>

            <!-- Row 3: Attendance & Exam -->
            <div class="form-row">
                <div class="form-group">
                    <label for="attendance">Attendance</label>
                    <input type="number" id="attendance" name="attendance" min="0" max="100" required>
                </div>
                <div class="form-group">
                    <label for="prelim">Prelim Exam</label>
                    <input type="number" id="prelim" name="prelim" min="0" max="100" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Add Student</button>
        </form>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table id="studentTable">
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Lab1</th>
                    <th>Lab2</th>
                    <th>Lab3</th>
                    <th>Prelim</th>
                    <th>Attendance</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- JS will populate -->
            </tbody>
        </table>
    </div>

</div>

<script src="record.js"></script>
</body>
</html>
