<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Games by Sales - Dashboard</title>
    <!-- Bootstrap CSS for good design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- styles are served from the project root -->
    <link rel="stylesheet" href="/static/css/rank.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Top 10 Video Games by Total Sales</h1>
            <p>Upload your CSV file to see the top revenue contributors aggregated by title.</p>
        </div>

        <div class="upload-section">
            <input type="file" id="csvFile" class="form-control" accept=".csv">
            <button id="uploadBtn" class="btn btn-primary">Upload & Analyze</button>
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>

        <div class="table-container">
            <table class="table table-bordered table-hover" id="resultsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Title</th>
                        <th>Platform</th>
                        <th>Genre</th>
                        <th>Publisher</th>
                        <th>Total Sales (M)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- script also served from root; leading slash required when HTML lives in templates/ -->
    <script src="/static/js/rank.js"></script>
</body>
</html>
