<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Dataset Processor</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>CSV Dataset Processor</h1>

        <div class="controls">
            <label for="columnSelect">Select Column:</label>
            <select id="columnSelect"></select>

            <label for="maxRows">Show first rows:</label>
            <input type="number" id="maxRows" value="25" min="1">
            <button id="processBtn" class="pro-btn">Process CSV</button>
        </div>

        

        <div class="output">
            <pre id="outputArea">Upload or select your CSV file to begin...</pre>
        </div>

        <!-- File Upload -->
        <div class="upload-section">
            <label for="csvFile">Choose CSV File:</label>
            <input type="file" id="csvFile" accept=".csv">
            <p class="note">Your file will be processed in the browser (no data is sent to any server).</p>
        </div>
    </div>

    <script src="../static/js/script.js"></script>
</body>
</html>
